front:
  text: 太上老君說常清靜經頌序玄羽章淵一
  hash: sha256:68f385e571492d98f82e809331b1c630b0d07a83b7393dc35e27661491c3d10b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0374_SJB_000-190815b, image: sjb/19/190815b.png}
body:
  text: 神峰默然子著夫源清流靜凑法海之波澄蒂固根深抱純陽之炁運盈虚消息六合周流原天地眹兆之由探陰陽樞機之要夫人者委形於天地惟清靜自然之歸混炁於陰陽具變通眞常之化清者撓之而不濁靜者安之而不動天得一清地得一寧人得一靈者一神也若是靈源湛徹聖道流通寂然不動應化無方感而遂通生成何已天地有斯常性清靜無餘男女無此常心昏迷有屬孰能濁以止靜之徐清而已及矣故我太上垂大慈悲演常清靜設教導俗輔正扶宗務化民以歸根使含眞而抱一體洽玄元煉神合道羽化飛仙不爲乖謬庶幾信受者體樞法要皆可相應人莫非清靜以爲天下正乃至千眞萬聖咸不岀於此矣太上老君說常清靜經頌註五太初為先虚無道自然混元權祖正妙體契宗玄演教明無上知常假喻詮因斯清静德闡化立經篇老君曰大道無形生育天地大道隱乎形眞精混窈冥二儀分始兆一氣運無停覆載誠難測生成育底寧陶甄能匠物蠢動盡含靈大道無情運行日月日月運虚空明明甚至公得天能久照麗物可咸通有質蒙光煦無情混象融陰陽常體道不息太無中大道無名長養萬物妙道實難名包含萬物生運時充地脉任信禀夭清吹煦眞消息沖和大化成圓通歸一體高下坦然平吾不知其名强名曰道無相杳無蹤離名混沌中未萌天地日安得雨雲風鑿破胚腪兆衝開物象蒙因斯分造化權立道無窮夫道者有清有濁有動有靜清濁陰陽氣周流上下衝自然成感化終則契圓通萬類含滋育三元配合同乾坤交泰定都會一真空天清地濁天動地静男清女濁男動女靜肇判兩儀分人靈至貴尊三才安宇宙二物定乾坤種種含真炁元元實相門剛柔相濟用體道敦能存降本流末而生萬物降本通眞體還元見末因春陽敷茂暢秋候主凋淪太極生形化純和造物新樞機推大運掌握任功神清者濁之源靜者動之基清靜理幽深誰能究竟尋觀空除萬境絶相了諸心慧月流丹漢慈雲覆翠岑寂然神不動應物顯知音人能常清靜天地悉皆歸人悟常清靜知源妙聖機太初無染滯全寂隱光輝默默藏沙界昏昏徹紫微三元昇降後天地悉皆歸夫人神好清而心擾之人心好靜而欲牽之心者靈之府神棲靜可安貪嗔癡易作戒定慧難觀深要正中正堅持閑内閑常無生六欲法界自然寬常能遣其欲而心自靜澄其心而神自清若遣諸情欲澄心妙洞觀同眞非物物歸寂棄般般水遠連天靜山高戴月寒圓融通智慧壷内衮金丸自然六欲不生三毒消滅正念無偏黨沖虚合自然六根塵頓息三毒病須痊妙道超空劫全神達上天些兒幽密處玄牝自綿綿所以不能者爲心未澄欲未遣也迷路失家鄉都緣昩已光心浮誠易動境熟為難忘欲染何能遣邪奸轉使荒回頭堪悟處返照見空王能遣之者内觀其心心無其心覺了諸塵漏分眀道眼開色聲非有礙知見定須埋神静千灾滅心虚萬慮灰清風穿玉户自有好音來外觀其形形無其形諸相觀非相其形是種无内含真法界體合大空虚雲静蟾光露潭澄練色鋪此般明顯示何在覓殊塗遠觀其物物無其物三者既悟唯見於空寂照觀諸物群靈豈有殊同真非可見絶迹莫能模了了堂中老休休法外无玄玄玄也泯八極任寬舒觀空亦空空無所空廓達真空界迴觀一物無混融同太漠湛寂體虚無洞照音常寂圓通性自如中間并内外不屬返元初所空既無無無亦無達了心無物無無實亦無何勞除妄想豈在辯精麤緣静虚施巧歸真任不渝這般消息密孰敢强名模無無既無湛然常寂萬法本來空無無合聖功湛然非内外寂爾泯西東心境雙忘處方圓一槩同杳冥超造化無物悉皆通寂無所寂欲豈能生欲既不生即是眞静假寂權為體還當去欲因妄緣如是息眞靜自然新契合無生法方知不夜春獨超天地外任意燕申申眞常應物眞常得性常應常静常清靜矣一定逹眞常神光莫可量照開三毒室射透五明堂寶月晴空露迷雲藴迹亡清風布消息應物任舒張如此清靜漸入真道既入眞道名爲得道曠劫鎮圓成無暗亦無明谷神常自寂法海晏然清正念投眞路澄心達妙程永離生死繫三界任寬行雖名得道實無所得了寂沉聲迹深通至理幽眞空寧有得實相本無修飲啄從他過威儀任自由豁然除擬議安靜保全周爲化衆生名爲得道能悟之者可傳聖道為證衆生化俱忘種種求頓超無漏果寧許有根由取捨安能動因緣亦斷流瞥然都放下聖道可傳留老君曰上士無争下士好爭上士何無争勤常抱志堅棲真常惔泊養素隱幽玄俯仰觀夭理窮通達道淵堪嗟未明者競法昩心田上德不德下德執德執着之者不名道德德化非求報恩寬肯自矜韜光藏大器明性瑩堅冰默契高穹遠深通至道弘豈同愚士執分别强談能衆生所以不得眞道者爲有妄心衆生多背道顛倒外邊求妄想因斯有眞靈昧了休本來無欠少何假强持修頓拂迷雲盡銀蟾照玉樓既有妄心即驚其神既驚其神即着萬物既着萬物即生貪求既生貪求即是煩惱謀事因生妄乖眞為動神皆心存愛欲着物起貪嗔常藴無明火還添煩惱塵從兹緣受報六道轉沉淪煩惱妄想憂苦身心便遭濁辱為妄生嗔慾貪癡作障緣憂愁長繫絆煩惱鎮纏綿為此迷真道從斯就業愆迴光能返照自覺妙中玄流浪生死常沉苦海永失真道煩惱緣興念何曾覺自心茫茫遭苦辱擾擾肯沉吟浪死無休息虚生直至今因而眞道失夢想轉來侵眞常之道悟者自得得悟道者常清静矣人若通天地俱蒙道炁存藏根深固蒂滅魄返安魂得悟長生路須開乆視門全眞神自化無上法王尊太上老君説常清静經頌註
